[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# API 경로는 Function으로 처리
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA 라우팅: 나머지 경로를 index.html로 (react-router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
